<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Prediction Infrastructure Banner</title>
  <desc id="desc">Abstract layered lines and nodes representing Earth system prediction infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3b"/>
      <stop offset="55%" stop-color="#1a4f7a"/>
      <stop offset="100%" stop-color="#73b3d8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5f7fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5f7fa" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="url(#line)" stroke-width="2" fill="none">
    <path d="M40 66 C220 46, 360 112, 560 86 S920 46, 1160 76"/>
    <path d="M20 132 C220 112, 350 183, 560 152 S910 122, 1180 157"/>
    <path d="M10 218 C190 198, 330 254, 560 228 S900 193, 1180 238"/>
  </g>
  <g fill="#f5f7fa" fill-opacity="0.8">
    <circle cx="260" cy="60" r="5"/>
    <circle cx="540" cy="90" r="5"/>
    <circle cx="810" cy="59" r="5"/>
    <circle cx="320" cy="171" r="5"/>
    <circle cx="640" cy="149" r="5"/>
    <circle cx="945" cy="141" r="5"/>
  </g>
</svg>
